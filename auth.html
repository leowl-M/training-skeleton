<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- shell: se aperta fuori dall'iframe, rientra nella shell (URL resta /).
         I link via email (recupero/conferma) hanno token nell'URL: lasciali passare. -->
    <script>
      (function () {
        if (window.top === window.self) {
          var h = location.hash + location.search;
          if (!/access_token|type=recovery|type=signup/.test(h))
            location.replace("/");
        }
      })();
    </script>
    <title>Accedi — Apice Studio</title>
    <link
      rel="icon"
      type="image/svg+xml"
      href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"><rect width="64" height="64" rx="14" fill="%23ff4d06"/><path d="M18 45 C34 45 30 19 46 19" stroke="white" stroke-width="6" fill="none" stroke-linecap="round"/><circle cx="18" cy="45" r="5.5" fill="white"/><circle cx="46" cy="19" r="5.5" fill="white"/></svg>'
    />
    <link rel="stylesheet" href="design-system/styles.css" />
    <style>
      /* ===== Apice Studio · Design System — look strumento ====================
         Token (colori/tipografia/spazi/effetti) importati da
         design-system/styles.css, linkato sopra. Default = corpo chiaro
         (light instrument); [data-theme="dark"] = charcoal hardware.
         ======================================================================= */
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html,
      body {
        height: 100%;
      }

      body {
        background: var(--paper);
        color: var(--ink);
        font-family: var(--font-sans);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: var(--space-9);
      }

      /* Card del form: modulo rialzato (superfici fisiche, niente vetro) */
      .auth-card {
        width: min(384px, 100%);
        background: var(--panel);
        border: 1px solid var(--border-strong);
        border-radius: var(--radius-3xl);
        box-shadow: var(--shadow-panel);
        padding: 30px 28px 26px;
      }

      .auth-logo {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: var(--space-9);
      }

      .auth-logo svg {
        width: 30px;
        height: 30px;
        border-radius: 7px;
        flex: none;
      }

      .auth-logo span {
        font-size: var(--text-lg);
        font-weight: var(--weight-bold);
        letter-spacing: var(--tracking-tight);
        color: var(--text-primary);
      }

      /* switch Accedi / Registrati: traccia incassata, key attiva arancio */
      .auth-seg {
        display: flex;
        gap: var(--space-1);
        background: var(--well);
        border-radius: var(--radius-md);
        padding: 3px;
        box-shadow: var(--shadow-well);
        margin-bottom: 22px;
      }

      .auth-seg button {
        flex: 1;
        font-family: var(--font-sans);
        font-size: var(--text-sm);
        font-weight: var(--weight-semibold);
        text-transform: uppercase;
        letter-spacing: var(--tracking-label);
        color: var(--text-secondary);
        background: transparent;
        border: 1px solid transparent;
        border-radius: var(--radius-sm);
        padding: 8px 4px;
        cursor: pointer;
        transition:
          background var(--dur) ease,
          color var(--dur) ease,
          box-shadow var(--dur) ease;
      }

      .auth-seg button:hover {
        color: var(--text-primary);
      }

      .auth-seg button.on {
        background: var(--accent);
        color: var(--accent-text);
        border-color: var(--accent-press);
        box-shadow: var(--shadow-key);
      }

      .auth-field {
        margin-bottom: 13px;
        display: flex;
        flex-direction: column;
      }

      .auth-field label {
        font-family: var(--font-sans);
        font-size: var(--text-xs);
        font-weight: var(--weight-semibold);
        text-transform: uppercase;
        letter-spacing: var(--tracking-label);
        color: var(--text-secondary);
        margin: 0 1px 7px;
      }

      /* Campi input: well incassato, valore in mono */
      .auth-field input {
        width: 100%;
        font-family: var(--font-mono);
        font-size: var(--text-md);
        letter-spacing: var(--tracking-mono);
        color: var(--text-primary);
        background: var(--surface);
        border: 1px solid var(--border-strong);
        border-radius: var(--radius-lg);
        padding: 10px 13px;
        outline: none;
        box-shadow: var(--shadow-well);
        transition:
          border-color var(--dur) ease,
          box-shadow var(--dur) ease;
      }

      .auth-field input:focus {
        border-color: var(--focus-ring);
        box-shadow: var(--shadow-well), 0 0 0 2px var(--accent-soft);
      }

      .auth-field input::placeholder {
        color: var(--text-tertiary);
      }

      /* Bottone submit: key primaria arancio, si abbassa alla pressione */
      .auth-submit {
        width: 100%;
        margin-top: 8px;
        font-family: var(--font-sans);
        font-size: var(--text-base);
        font-weight: var(--weight-semibold);
        letter-spacing: var(--tracking-tight);
        color: var(--accent-text);
        background: var(--accent);
        border: 1px solid var(--accent-press);
        border-radius: var(--radius-md);
        padding: 12px;
        cursor: pointer;
        box-shadow: var(--shadow-key);
        transition:
          box-shadow var(--dur) var(--ease-key),
          transform var(--dur-fast) var(--ease-key),
          background var(--dur) ease;
      }

      .auth-submit:hover {
        background: var(--accent-press);
        box-shadow: var(--shadow-key-hover);
      }

      .auth-submit:active {
        transform: translateY(var(--key-travel));
        box-shadow: var(--shadow-key-press);
      }

      .auth-submit:disabled {
        opacity: 0.5;
        cursor: default;
        box-shadow: var(--shadow-key);
      }

      /* area messaggi (errore / info) */
      .auth-msg {
        display: none;
        font-family: var(--font-sans);
        font-size: var(--text-sm);
        line-height: 1.45;
        border-radius: var(--radius-lg);
        padding: 10px 12px;
        margin-bottom: 16px;
      }

      .auth-msg.show {
        display: block;
      }

      .auth-msg.err {
        color: var(--danger);
        background: var(--danger-soft);
        border: 1px solid var(--danger-line);
      }

      .auth-msg.ok {
        color: var(--text-primary);
        background: var(--surface);
        border: 1px solid var(--border-strong);
      }

      .auth-foot {
        margin-top: 18px;
        text-align: center;
        font-family: var(--font-sans);
        font-size: var(--text-sm);
        color: var(--text-secondary);
        line-height: 1.8;
      }

      .auth-foot a {
        color: var(--accent);
        text-decoration: none;
        cursor: pointer;
        font-weight: var(--weight-semibold);
      }

      .auth-foot a:hover {
        text-decoration: underline;
      }
    </style>
  </head>

  <body>
    <main class="auth-card">
      <div class="auth-logo">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
          <rect width="64" height="64" rx="14" fill="var(--accent)" />
          <path
            d="M18 45 C34 45 30 19 46 19"
            stroke="white"
            stroke-width="6"
            fill="none"
            stroke-linecap="round"
          />
          <circle cx="18" cy="45" r="5.5" fill="white" />
          <circle cx="46" cy="19" r="5.5" fill="white" />
        </svg>
        <span>Apice Studio</span>
      </div>

      <div class="auth-seg">
        <button type="button" id="tabLogin" class="on">Accedi</button>
        <button type="button" id="tabSignup">Registrati</button>
      </div>

      <div class="auth-msg" id="msg"></div>

      <form id="authForm" autocomplete="on" novalidate>
        <div class="auth-field" id="nameField">
          <label for="fullname">Nome completo</label>
          <input
            type="text"
            id="fullname"
            name="fullname"
            placeholder="Mario Rossi"
            autocomplete="name"
            autocapitalize="words"
          />
        </div>
        <div class="auth-field">
          <label for="email">Email</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="tu@esempio.com"
            autocomplete="email"
            required
          />
        </div>
        <div class="auth-field">
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="••••••••"
            autocomplete="current-password"
            required
            minlength="6"
          />
        </div>
        <div class="auth-field" id="codeField">
          <label for="invite">Codice di accesso</label>
          <input
            type="text"
            id="invite"
            name="invite"
            placeholder="Il codice che hai ricevuto"
            autocomplete="off"
            autocapitalize="characters"
            spellcheck="false"
          />
        </div>
        <button type="submit" class="auth-submit" id="submitBtn">Accedi</button>
      </form>

      <div class="auth-foot" id="foot"></div>
    </main>

    <!-- Supabase JS (v2) da CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
      // ====== CONFIG SUPABASE ======
      // Sostituisci con i valori del tuo progetto (Project Settings -> API).
      // La anon key è pubblica: può stare nel frontend senza problemi.
      const SUPABASE_URL = "https://tasepcbrgoojhswhsmdj.supabase.co";
      const SUPABASE_ANON_KEY = "sb_publishable_hqdHdYaE5ew-Q9AfNpUniA_n5po1xsU";
      // Dove mandare l'utente dopo l'accesso (la dashboard):
      const APP_URL = "/dashboard.html";

      const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

      const el = (id) => document.getElementById(id);
      const form = el("authForm"),
        emailIn = el("email"),
        passIn = el("password"),
        inviteIn = el("invite"),
        nameIn = el("fullname"),
        submitBtn = el("submitBtn"),
        msg = el("msg"),
        foot = el("foot"),
        tabLogin = el("tabLogin"),
        tabSignup = el("tabSignup");

      let mode = "login"; // "login" | "signup" | "recover" | "reset"
      const seg = document.querySelector(".auth-seg");
      const emailField = emailIn.closest(".auth-field");
      const passField = passIn.closest(".auth-field");
      const codeField = el("codeField");
      const nameField = el("nameField");

      function showMsg(text, kind) {
        msg.textContent = text;
        msg.className = "auth-msg show " + (kind || "ok");
      }
      function clearMsg() {
        msg.className = "auth-msg";
        msg.textContent = "";
      }

      // traduce gli errori Supabase in messaggi chiari in italiano
      function friendlyError(error) {
        const m = (error && error.message ? error.message : "").toLowerCase();
        if (m.includes("invalid login credentials"))
          return "Email o password errati.";
        if (m.includes("email not confirmed"))
          return "Email non ancora confermata. Controlla la tua casella.";
        if (
          m.includes("user already registered") ||
          m.includes("already registered")
        )
          return "Esiste già un account con questa email. Prova ad accedere.";
        if (m.includes("password should be at least"))
          return "La password deve avere almeno 6 caratteri.";
        if (
          m.includes("unable to validate email") ||
          m.includes("invalid email")
        )
          return "Indirizzo email non valido.";
        if (m.includes("rate limit") || m.includes("too many"))
          return "Troppi tentativi. Riprova tra qualche minuto.";
        return (
          (error && error.message) || "Si è verificato un errore. Riprova."
        );
      }

      function setMode(next) {
        mode = next;
        clearMsg();
        // tabs visibili solo in login/signup
        seg.style.display = mode === "login" || mode === "signup" ? "flex" : "none";
        tabLogin.classList.toggle("on", mode === "login");
        tabSignup.classList.toggle("on", mode === "signup");
        // campi visibili per modalità
        emailField.style.display = mode === "reset" ? "none" : "";
        passField.style.display = mode === "recover" ? "none" : "";
        codeField.style.display = mode === "signup" ? "" : "none";
        nameField.style.display = mode === "signup" ? "" : "none";
        const labels = {
          login: "Accedi",
          signup: "Crea account",
          recover: "Invia link di recupero",
          reset: "Aggiorna password",
        };
        submitBtn.textContent = labels[mode];
        passIn.setAttribute(
          "autocomplete",
          mode === "login" ? "current-password" : "new-password",
        );
        if (mode === "login")
          foot.innerHTML =
            'Non hai un account? <a data-go="signup">Registrati</a><br><a data-go="recover">Password dimenticata?</a>';
        else if (mode === "signup")
          foot.innerHTML = 'Hai già un account? <a data-go="login">Accedi</a>';
        else if (mode === "recover")
          foot.innerHTML = '<a data-go="login">‹ Torna al login</a>';
        else foot.innerHTML = "";
        for (const a of foot.querySelectorAll("a[data-go]"))
          a.onclick = () => setMode(a.dataset.go);
      }

      tabLogin.onclick = () => setMode("login");
      tabSignup.onclick = () => setMode("signup");

      // ====== AUTH ======
      async function signIn(email, password) {
        return sb.auth.signInWithPassword({ email, password });
      }
      async function signUp(email, password, fullName, inviteCode) {
        return sb.auth.signUp({
          email,
          password,
          options: {
            emailRedirectTo: window.location.origin + APP_URL,
            data: { full_name: fullName, invite_code: inviteCode },
          },
        });
      }

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        clearMsg();
        const email = emailIn.value.trim();
        const password = passIn.value;
        // validazione per modalità
        if (mode !== "reset" && !email) {
          showMsg("Inserisci l'email.", "err");
          return;
        }
        if (mode !== "recover" && (!password || password.length < 6)) {
          showMsg("La password deve avere almeno 6 caratteri.", "err");
          return;
        }
        let inviteCode = "";
        let fullName = "";
        if (mode === "signup") {
          fullName = nameIn.value.trim();
          if (!fullName) {
            showMsg("Inserisci il tuo nome completo.", "err");
            return;
          }
          inviteCode = inviteIn.value.trim();
          if (!inviteCode) {
            showMsg("Inserisci il codice di accesso.", "err");
            return;
          }
        }

        submitBtn.disabled = true;
        const label = submitBtn.textContent;
        submitBtn.textContent = "Attendi…";

        try {
          if (mode === "login") {
            const { error } = await signIn(email, password);
            if (error) showMsg(friendlyError(error), "err");
            else return void (window.location.href = APP_URL);
          } else if (mode === "signup") {
            // verifica il codice di accesso prima di creare l'account
            const { data: codeOk, error: codeErr } = await sb.rpc(
              "check_invite_code",
              { p_code: inviteCode },
            );
            if (codeErr) {
              showMsg(
                "Impossibile verificare il codice. Riprova tra poco.",
                "err",
              );
              return;
            }
            if (!codeOk) {
              showMsg("Codice di accesso non valido o non attivo.", "err");
              return;
            }
            const { data, error } = await signUp(
              email,
              password,
              fullName,
              inviteCode,
            );
            if (error) showMsg(friendlyError(error), "err");
            else if (data.session)
              return void (window.location.href = APP_URL);
            else {
              showMsg(
                "Account creato! Ti abbiamo inviato un'email di conferma: controlla la casella per attivare l'accesso.",
                "ok",
              );
              setMode("login");
            }
          } else if (mode === "recover") {
            const { error } = await sb.auth.resetPasswordForEmail(email, {
              redirectTo: window.location.origin + "/auth.html",
            });
            if (error) showMsg(friendlyError(error), "err");
            else {
              showMsg(
                "Se l'email è registrata, riceverai un link per reimpostare la password.",
                "ok",
              );
              setMode("login");
            }
          } else if (mode === "reset") {
            const { error } = await sb.auth.updateUser({ password });
            if (error) showMsg(friendlyError(error), "err");
            else {
              showMsg("Password aggiornata! Reindirizzamento…", "ok");
              setTimeout(() => (window.location.href = APP_URL), 900);
            }
          }
        } catch (err) {
          showMsg("Errore di rete: " + (err.message || err), "err");
        } finally {
          submitBtn.disabled = false;
          submitBtn.textContent = label;
        }
      });

      // l'utente arriva dal link di recupero password → mostra il form "nuova password"
      sb.auth.onAuthStateChange((event) => {
        if (event === "PASSWORD_RECOVERY") setMode("reset");
      });

      // avvio: se è un recupero password mostra il form reset; altrimenti, se già loggato, vai all'app
      (async () => {
        const isRecovery =
          location.hash.includes("type=recovery") ||
          location.search.includes("type=recovery");
        if (!isRecovery) {
          try {
            const { data } = await sb.auth.getSession();
            if (data && data.session) {
              window.location.href = APP_URL;
              return;
            }
          } catch (e) {}
        }
        setMode(isRecovery ? "reset" : "login");
      })();
    </script>
  </body>
</html>
