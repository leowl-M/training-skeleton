<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- shell: se aperta fuori dall'iframe, rientra nella shell (URL resta /) -->
    <script>
      (function () {
        if (window.top === window.self) {
          var h = location.hash + location.search;
          if (!/access_token|type=recovery|type=signup/.test(h))
            location.replace("/");
        }
      })();
    </script>
    <title>I tuoi Font — Apice Studio</title>
    <link rel="icon" type="image/svg+xml"
        href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"><rect width="64" height="64" rx="14" fill="%23ff4d06"/><path d="M18 45 C34 45 30 19 46 19" stroke="white" stroke-width="6" fill="none" stroke-linecap="round"/><circle cx="18" cy="45" r="5.5" fill="white"/><circle cx="46" cy="19" r="5.5" fill="white"/></svg>' />
    <link rel="stylesheet" href="design-system/styles.css" />
    <style>
        /* ===== Apice Studio · Design System — bridge ==========================
           I token DS (colori/tipo/spazi/effetti) arrivano da
           design-system/styles.css. Qui mappo i vecchi nomi-variabile usati nel
           markup sui token DS, così tutto il file adotta il look strumento.
           --line, --muted, --accent, --accent-text, --glyph restano quelli DS.
           ===================================================================== */
        :root {
            --bg: var(--paper);
            --bg2: var(--panel);
            --glass: var(--panel);
            --glass2: var(--surface);
            --line2: var(--border-strong);
            --text: var(--ink);
            --btn: var(--surface);
            --shadow: var(--shadow-panel);
            --mono: var(--font-sans);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            height: 100%;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--mono);
        }

        .dash {
            display: flex;
            height: 100vh;
        }

        /* ===== Sidebar ===== */
        .side {
            width: 232px;
            flex: none;
            background: var(--bg2);
            border-right: 1px solid var(--line);
            display: flex;
            flex-direction: column;
            padding: 18px 14px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 9px;
            padding: 4px 6px 0;
        }

        .brand svg {
            width: 26px;
            height: 26px;
            border-radius: 7px;
        }

        .brand span {
            font-size: 13px;
            font-weight: 600;
        }

        .nav {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 2px;
            margin-top: 22px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 10px;
            font-family: var(--mono);
            font-size: 12.5px;
            text-align: left;
            color: var(--muted);
            background: transparent;
            border: 0;
            border-radius: 9px;
            padding: 9px 11px;
            cursor: pointer;
            transition: background 0.14s ease, color 0.14s ease;
        }

        .nav-item svg {
            width: 15px;
            height: 15px;
            fill: none;
            stroke: currentColor;
            stroke-width: 1.5;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .nav-item:hover {
            background: var(--btn);
            color: var(--text);
        }

        .nav-item.on {
            background: var(--btn);
            color: var(--text);
            box-shadow: inset 2px 0 0 var(--accent);
        }

        .side-foot {
            border-top: 1px solid var(--line);
            padding-top: 12px;
        }

        .logout {
            width: 100%;
            display: flex;
            align-items: center;
            gap: 10px;
            font-family: var(--mono);
            font-size: 12.5px;
            color: var(--muted);
            background: transparent;
            border: 1px solid transparent;
            border-radius: 9px;
            padding: 9px 11px;
            cursor: pointer;
            transition: background 0.14s ease, color 0.14s ease;
        }

        .logout svg {
            width: 15px;
            height: 15px;
            fill: none;
            stroke: currentColor;
            stroke-width: 1.5;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .logout:hover {
            background: var(--btn);
            color: var(--text);
        }

        /* ===== Main ===== */
        .main {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .topbar {
            height: 60px;
            flex: none;
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 0 26px;
            border-bottom: 1px solid var(--line);
        }

        /* barra di ricerca: stile replicato dall'input #word */
        .search {
            flex: 1;
            max-width: 440px;
            font-family: var(--mono);
            font-size: 13px;
            color: var(--text);
            background: var(--btn);
            border: 1px solid var(--line);
            border-radius: var(--radius-lg);
            padding: 10px 14px;
            outline: none;
            box-shadow: var(--shadow-well);
            transition: border-color 0.14s ease, box-shadow 0.14s ease;
        }

        .search:focus {
            border-color: var(--focus-ring);
            box-shadow: var(--shadow-well), 0 0 0 2px var(--accent-soft);
        }

        .search::placeholder {
            color: var(--muted);
        }

        .avatar {
            margin-left: auto;
            width: 34px;
            height: 34px;
            flex: none;
            border-radius: 50%;
            background: var(--accent);
            color: var(--accent-text);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 600;
            cursor: default;
        }

        .content {
            flex: 1;
            overflow-y: auto;
            padding: 28px 26px 40px;
        }

        .content h1 {
            font-size: 18px;
            font-weight: 600;
            letter-spacing: 0.2px;
        }

        .content .sub {
            font-size: 12px;
            color: var(--muted);
            margin-top: 4px;
        }

        /* ===== Griglia card ===== */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(196px, 1fr));
            gap: 16px;
            margin-top: 22px;
        }

        .bcard {
            position: relative;
            display: flex;
            flex-direction: column;
            text-align: left;
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: var(--radius-xl);
            overflow: hidden;
            cursor: pointer;
            font-family: var(--font-sans);
            color: var(--text);
            box-shadow: var(--shadow-card);
            transition: transform 0.12s ease, border-color 0.12s ease, box-shadow 0.12s ease;
        }

        .favmark {
            position: absolute;
            top: 8px;
            left: 10px;
            font-size: 13px;
            color: var(--accent);
        }

        .cardmenu {
            position: absolute;
            top: 7px;
            right: 7px;
            width: 26px;
            height: 26px;
            border: 1px solid transparent;
            border-radius: var(--radius-sm);
            background: transparent;
            color: var(--muted);
            font-size: 15px;
            line-height: 1;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.12s ease, background 0.12s ease, color 0.12s ease, box-shadow 0.12s ease;
        }

        .bcard:hover .cardmenu,
        .cardmenu:focus {
            opacity: 1;
        }

        .cardmenu:hover {
            background: var(--surface);
            color: var(--text);
            border-color: var(--border-strong);
            box-shadow: var(--shadow-key);
        }

        #cardMenu {
            position: fixed;
            z-index: 50;
            min-width: 178px;
            display: flex;
            flex-direction: column;
            gap: 2px;
            background: var(--panel);
            border: 1px solid var(--border-strong);
            border-radius: var(--radius-2xl);
            padding: 6px;
            box-shadow: var(--shadow-panel);
        }

        .cm-item {
            font-family: var(--mono);
            font-size: 12px;
            text-align: left;
            color: var(--text);
            background: transparent;
            border: 0;
            border-radius: 7px;
            padding: 8px 10px;
            cursor: pointer;
        }

        .cm-item:hover {
            background: var(--btn);
        }

        .cm-item.danger {
            color: var(--danger);
        }

        .bcard:hover {
            transform: translateY(-2px);
            border-color: var(--line2);
            box-shadow: var(--shadow-panel);
        }

        .bcard .thumb {
            height: 124px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 46px;
            color: var(--glyph);
            background: var(--panel);
            border-bottom: 1px solid var(--line);
        }

        .bcard .meta {
            padding: 11px 13px 13px;
        }

        .bcard .pname {
            font-size: 12.5px;
            font-weight: var(--weight-semibold);
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .bcard .pdate {
            font-family: var(--font-mono);
            font-size: 10.5px;
            color: var(--muted);
            margin-top: 3px;
        }

        /* card "Nuovo Progetto" in accento */
        .newcard {
            align-items: center;
            justify-content: center;
            gap: 10px;
            min-height: 178px;
            background: var(--accent);
            border-color: var(--accent-press);
            color: var(--accent-text);
            box-shadow: var(--shadow-key);
        }

        .newcard:hover {
            border-color: var(--accent-press);
            background: var(--accent-press);
            box-shadow: var(--shadow-key-hover);
        }

        .newcard:active {
            transform: translateY(var(--key-travel));
            box-shadow: var(--shadow-key-press);
        }

        .newcard .plus {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            line-height: 1;
            background: rgba(255, 255, 255, 0.18);
        }

        .newcard .nlabel {
            font-size: 13px;
            font-weight: 600;
        }

        .empty {
            color: var(--muted);
            font-size: 12.5px;
            padding: 30px 4px;
            grid-column: 1 / -1;
        }

        /* blocco schermi piccoli: la dashboard è pensata per desktop */
        #mobileBlock {
            display: none;
        }

        @media (max-width: 720px) {
            .dash {
                display: none;
            }

            #mobileBlock {
                position: fixed;
                inset: 0;
                z-index: 9999;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                gap: 14px;
                text-align: center;
                padding: 32px;
                background: radial-gradient(circle at 50% 32%, var(--bg2), var(--bg) 78%);
            }

            #mobileBlock svg {
                width: 46px;
                height: 46px;
                border-radius: 12px;
            }

            #mobileBlock h2 {
                font-size: 16px;
                font-weight: 600;
            }

            #mobileBlock p {
                font-size: 12.5px;
                color: var(--muted);
                line-height: 1.55;
                max-width: 300px;
            }
        }
    </style>
</head>

<body>
    <div id="mobileBlock">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
            <rect width="64" height="64" rx="14" fill="var(--accent)" />
            <path d="M18 45 C34 45 30 19 46 19" stroke="white" stroke-width="6" fill="none" stroke-linecap="round" />
            <circle cx="18" cy="45" r="5.5" fill="white" />
            <circle cx="46" cy="19" r="5.5" fill="white" />
        </svg>
        <h2>Apice Studio si usa da desktop</h2>
        <p>Apri la dashboard da un computer con uno schermo più grande.</p>
    </div>
    <div class="dash">
        <!-- ===== Sidebar ===== -->
        <aside class="side">
            <div class="brand">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
                    <rect width="64" height="64" rx="14" fill="var(--accent)" />
                    <path d="M18 45 C34 45 30 19 46 19" stroke="white" stroke-width="6" fill="none"
                        stroke-linecap="round" />
                    <circle cx="18" cy="45" r="5.5" fill="white" />
                    <circle cx="46" cy="19" r="5.5" fill="white" />
                </svg>
                <span>@woozy.design</span>
            </div>

            <nav class="nav" id="nav">
                <button class="nav-item on" data-view="recenti">
                    <svg viewBox="0 0 16 16">
                        <circle cx="8" cy="8" r="6" />
                        <path d="M8 5v3l2 1.5" />
                    </svg>Recenti
                </button>
                <button class="nav-item" data-view="bozze">
                    <svg viewBox="0 0 16 16">
                        <path d="M9 2H4v12h8V5z" />
                        <path d="M9 2v3h3" />
                    </svg>Bozze
                </button>
                <button class="nav-item" data-view="preferiti">
                    <svg viewBox="0 0 16 16">
                        <path d="M8 2.5l1.7 3.5 3.8.5-2.8 2.7.7 3.8L8 11.7 4.6 13.5l.7-3.8L2.5 7l3.8-.5z" />
                    </svg>Preferiti
                </button>
            </nav>

            <div class="side-foot">
                <button class="logout" id="aboutBtn">
                    <svg viewBox="0 0 16 16">
                        <circle cx="8" cy="8" r="6" />
                        <path d="M8 7.5v3.5" />
                        <path d="M8 5.2v.1" />
                    </svg>About
                </button>
                <button class="logout" id="logoutBtn">
                    <svg viewBox="0 0 16 16">
                        <path d="M10 2.5H3.5v11H10" />
                        <path d="M7.5 8h6M11 5.5L13.5 8 11 10.5" />
                    </svg>Esci
                </button>
            </div>
        </aside>

        <!-- ===== Main ===== -->
        <main class="main">
            <header class="topbar">
                <input type="search" class="search" id="search" placeholder="Cerca tra i tuoi font…"
                    autocomplete="off" />
                <div class="avatar" id="avatar" title="Account">?</div>
            </header>

            <div class="content">
                <h1 id="viewTitle">I tuoi Font</h1>
                <div class="sub" id="viewSub">I progetti su cui hai lavorato di recente</div>
                <div class="grid" id="grid"></div>
            </div>
        </main>
    </div>

    <!-- Supabase + sessione condivisa (guardia auth + sbClient + ApiceLogout) -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/session.js"></script>
    <script>
        const EDITOR_URL = "/editor.html"; // dove si apre/crea un progetto

        // ====== DATI PROGETTI ======
        // Per ora dati finti. La forma rispecchia una riga della tabella `projects`
        // così sostituire con Supabase è immediato (vedi fetchProjects()).
        const FAKE_PROJECTS = [
            { id: "1", name: "Grotesque Mono", updated_at: "2026-06-12T10:00:00Z", sample: "Ag", is_draft: false, is_fav: true },
            { id: "2", name: "Serif Editoriale", updated_at: "2026-06-10T16:30:00Z", sample: "Rs", is_draft: false, is_fav: false },
            { id: "3", name: "Display Bold", updated_at: "2026-06-08T09:15:00Z", sample: "Bd", is_draft: true, is_fav: false },
            { id: "4", name: "Script Morbido", updated_at: "2026-05-30T20:00:00Z", sample: "fk", is_draft: true, is_fav: true },
            { id: "5", name: "Pixel 8x8", updated_at: "2026-05-22T12:45:00Z", sample: "px", is_draft: false, is_fav: false },
        ];

        const client = () => (typeof sbClient !== "undefined" ? sbClient : null);
        let loadError = null;

        async function fetchProjects() {
            loadError = null;
            const c = client();
            if (!c) return FAKE_PROJECTS; // offline / non configurato: demo
            const { data, error } = await c
                .from("projects")
                .select("id, name, updated_at, sample, is_draft, is_fav")
                .order("updated_at", { ascending: false });
            if (error) {
                console.warn("Supabase projects:", error.message);
                loadError = error.message;
                return [];
            }
            return data || [];
        }

        // crea un nuovo progetto vuoto e apri l'editor su di esso
        async function createAndOpen() {
            const c = client();
            if (!c) { window.location.href = EDITOR_URL; return; }
            const { data: sess } = await c.auth.getSession();
            const uid = sess && sess.session && sess.session.user.id;
            if (!uid) { window.location.replace("/auth.html"); return; }
            const { data, error } = await c
                .from("projects")
                .insert({ user_id: uid, name: "Senza nome", data: {}, sample: "Aa" })
                .select("id")
                .single();
            if (error) {
                alert("Impossibile creare il progetto: " + error.message);
                return;
            }
            window.location.href = EDITOR_URL + "?p=" + data.id;
        }

        // ====== STATO UI ======
        let allProjects = [];
        let view = "recenti";
        let query = "";

        const VIEWS = {
            recenti: { title: "I tuoi Font", sub: "I progetti su cui hai lavorato di recente", filter: () => true },
            bozze: { title: "Bozze", sub: "Progetti non ancora finalizzati", filter: (p) => p.is_draft },
            preferiti: { title: "Preferiti", sub: "I font che hai contrassegnato", filter: (p) => p.is_fav },
        };

        function timeAgo(iso) {
            const d = new Date(iso), now = new Date(), s = Math.max(0, (now - d) / 1000);
            if (s < 3600) return "modificato " + Math.round(s / 60) + " min fa";
            if (s < 86400) return "modificato " + Math.round(s / 3600) + " h fa";
            const days = Math.round(s / 86400);
            if (days < 30) return "modificato " + days + (days === 1 ? " giorno fa" : " giorni fa");
            return "modificato il " + d.toLocaleDateString("it-IT");
        }

        function openProject(id) {
            window.location.href = id ? EDITOR_URL + "?p=" + encodeURIComponent(id) : EDITOR_URL;
        }

        function renderGrid() {
            const grid = document.getElementById("grid");
            grid.innerHTML = "";

            // prima card: Nuovo Progetto
            const nw = document.createElement("button");
            nw.className = "bcard newcard";
            nw.innerHTML = '<div class="plus">+</div><div class="nlabel">Nuovo Progetto</div>';
            nw.onclick = createAndOpen;
            grid.appendChild(nw);

            const list = allProjects
                .filter(VIEWS[view].filter)
                .filter((p) => p.name.toLowerCase().includes(query));

            for (const p of list) {
                const card = document.createElement("div");
                card.className = "bcard project";
                card.tabIndex = 0;
                const thumb = document.createElement("div");
                thumb.className = "thumb";
                thumb.textContent = p.sample || p.name.slice(0, 2);
                if (p.is_fav) {
                    const star = document.createElement("div");
                    star.className = "favmark";
                    star.textContent = "★";
                    thumb.appendChild(star);
                }
                const menuBtn = document.createElement("button");
                menuBtn.className = "cardmenu";
                menuBtn.textContent = "⋯";
                menuBtn.title = "Azioni";
                menuBtn.onclick = (e) => {
                    e.stopPropagation();
                    openCardMenu(p, menuBtn);
                };
                const meta = document.createElement("div");
                meta.className = "meta";
                const name = document.createElement("div");
                name.className = "pname";
                name.textContent = p.name;
                const date = document.createElement("div");
                date.className = "pdate";
                date.textContent = timeAgo(p.updated_at);
                meta.append(name, date);
                card.append(thumb, menuBtn, meta);
                card.onclick = () => openProject(p.id);
                grid.appendChild(card);
            }

            if (!list.length) {
                const e = document.createElement("div");
                e.className = "empty";
                e.textContent = loadError
                    ? "Impossibile caricare i progetti: " + loadError + " — controlla la connessione o che la tabella sia configurata."
                    : query
                        ? "Nessun font trovato per “" + query + "”."
                        : "Ancora nessun font qui. Creane uno nuovo!";
                grid.appendChild(e);
            }
        }

        // ====== menu sulle card (rinomina / preferiti / elimina) ======
        async function reloadProjects() {
            allProjects = await fetchProjects();
            renderGrid();
        }
        function closeCardMenu() {
            const m = document.getElementById("cardMenu");
            if (m) m.remove();
        }
        function openCardMenu(p, anchor) {
            closeCardMenu();
            const c = client();
            const m = document.createElement("div");
            m.id = "cardMenu";
            const mk = (label, danger, fn) => {
                const b = document.createElement("button");
                b.className = "cm-item" + (danger ? " danger" : "");
                b.textContent = label;
                b.onclick = (e) => { e.stopPropagation(); closeCardMenu(); fn(); };
                return b;
            };
            m.append(
                mk("Rinomina", false, async () => {
                    const name = prompt("Nuovo nome del font:", p.name);
                    if (!name || !c) return;
                    const { error } = await c.from("projects").update({ name }).eq("id", p.id);
                    if (error) return alert("Errore: " + error.message);
                    reloadProjects();
                }),
                mk(p.is_fav ? "Rimuovi dai preferiti" : "Aggiungi ai preferiti", false, async () => {
                    if (!c) return;
                    const { error } = await c.from("projects").update({ is_fav: !p.is_fav }).eq("id", p.id);
                    if (error) return alert("Errore: " + error.message);
                    reloadProjects();
                }),
                mk("Elimina", true, async () => {
                    if (!confirm("Eliminare “" + p.name + "”? L'azione è definitiva.")) return;
                    if (!c) return;
                    const { error } = await c.from("projects").delete().eq("id", p.id);
                    if (error) return alert("Errore: " + error.message);
                    reloadProjects();
                }),
            );
            document.body.appendChild(m);
            const r = anchor.getBoundingClientRect(),
                mw = m.offsetWidth || 180;
            m.style.left = Math.min(r.left, window.innerWidth - mw - 8) + "px";
            m.style.top = r.bottom + 4 + "px";
        }
        document.addEventListener("click", (e) => {
            if (!e.target.closest || !e.target.closest("#cardMenu")) closeCardMenu();
        });
        window.addEventListener("keydown", (e) => { if (e.key === "Escape") closeCardMenu(); });

        function setView(v) {
            view = v;
            document.getElementById("viewTitle").textContent = VIEWS[v].title;
            document.getElementById("viewSub").textContent = VIEWS[v].sub;
            for (const b of document.querySelectorAll(".nav-item"))
                b.classList.toggle("on", b.dataset.view === v);
            renderGrid();
        }

        // ====== WIRING ======
        document.getElementById("nav").addEventListener("click", (e) => {
            const b = e.target.closest(".nav-item");
            if (b) setView(b.dataset.view);
        });
        document.getElementById("search").addEventListener("input", (e) => {
            query = e.target.value.trim().toLowerCase();
            renderGrid();
        });
        document.getElementById("logoutBtn").onclick = () => {
            if (typeof ApiceLogout === "function") ApiceLogout();
            else window.location.replace("/auth.html");
        };
        document.getElementById("aboutBtn").onclick = () => {
            window.location.href = "/about.html";
        };

        // ====== AVVIO: controllo auth + caricamento ======
        // (la guardia in session.js reindirizza già a /auth.html se non loggato;
        //  qui completiamo l'avatar e carichiamo i progetti)
        (async () => {
            const client = typeof sbClient !== "undefined" ? sbClient : null;
            try {
                if (client) {
                    const { data } = await client.auth.getSession();
                    const sess = data && data.session;
                    if (!sess) {
                        window.location.replace("/auth.html");
                        return;
                    }
                    const email = sess.user && sess.user.email;
                    const av = document.getElementById("avatar");
                    av.textContent = email ? email[0].toUpperCase() : "?";
                    av.title = email || "Account";
                }
            } catch (e) {
                window.location.replace("/auth.html");
                return;
            }
            allProjects = await fetchProjects();
            setView("recenti");
        })();
    </script>
</body>

</html>
