<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Apice Studio</title>
    <link
      rel="icon"
      type="image/svg+xml"
      href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"><rect width="64" height="64" rx="14" fill="%23ff4d06"/><path d="M18 45 C34 45 30 19 46 19" stroke="white" stroke-width="6" fill="none" stroke-linecap="round"/><circle cx="18" cy="45" r="5.5" fill="white"/><circle cx="46" cy="19" r="5.5" fill="white"/></svg>'
    />
    <link rel="stylesheet" href="design-system/styles.css" />
    <style>
      html,
      body {
        height: 100%;
        margin: 0;
        background: var(--paper);
      }
      /* iframe a tutto schermo: contiene auth / dashboard / editor / about.
         La barra indirizzi resta sempre su "/". */
      #app {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        border: 0;
        display: block;
      }
    </style>
  </head>
  <body>
    <!-- src iniziale = login: auth.html, se la sessione è attiva, rimanda
         da solo alla dashboard (sempre dentro l'iframe). -->
    <iframe id="app" src="/auth.html" title="Apice Studio"></iframe>
  </body>
</html>
